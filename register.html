<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | EventHub</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Background Orbs -->
  <div class="bg-orbs">
    <div class="orb"></div>
    <div class="orb"></div>
    <div class="orb"></div>
  </div>

  <div class="container">

    <!-- Navbar -->
    <nav class="navbar glass">
      <a href="index.html" class="logo">EventHub</a>
      <button class="nav-toggle" aria-label="Toggle navigation">☰</button>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="register.html" class="active">Register</a></li>
        <li><a href="login.php">Admin</a></li>
      </ul>
    </nav>

    <!-- Registration Form -->
    <div class="form-container glass">
      <h2>Event Registration</h2>
      <p class="subtitle">Fill in your details to register for an event</p>

      <!-- The form submits to register.php -->
      <form id="registrationForm" action="register.php" method="POST" enctype="multipart/form-data">

        <!-- Full Name -->
        <div class="form-group">
          <label>Full Name <span class="required">*</span></label>
          <input type="text" name="name" class="form-control" placeholder="Enter your full name" required>
          <span class="error-msg"></span>
        </div>

        <!-- Email & Phone -->
        <div class="form-row">
          <div class="form-group">
            <label>Email Address <span class="required">*</span></label>
            <input type="email" name="email" class="form-control" placeholder="you@email.com" required>
            <span class="error-msg"></span>
          </div>
          <div class="form-group">
            <label>Phone Number <span class="required">*</span></label>
            <input type="tel" name="phone" class="form-control" placeholder="10-digit number" required>
            <span class="error-msg"></span>
          </div>
        </div>

        <!-- Department & Year -->
        <div class="form-row">
          <div class="form-group">
            <label>Department <span class="required">*</span></label>
            <select name="department" class="form-control" required>
              <option value="">Select Department</option>
              <option value="CSE">Computer Science (CSE)</option>
              <option value="ECE">Electronics (ECE)</option>
              <option value="EEE">Electrical (EEE)</option>
              <option value="MECH">Mechanical (MECH)</option>
              <option value="CIVIL">Civil (CIVIL)</option>
              <option value="IT">Information Technology (IT)</option>
              <option value="AIDS">AI & Data Science (AIDS)</option>
              <option value="MBA">MBA</option>
              <option value="OTHER">Other</option>
            </select>
            <span class="error-msg"></span>
          </div>
          <div class="form-group">
            <label>Year <span class="required">*</span></label>
            <select name="year" class="form-control" required>
              <option value="">Select Year</option>
              <option value="1">1st Year</option>
              <option value="2">2nd Year</option>
              <option value="3">3rd Year</option>
              <option value="4">4th Year</option>
            </select>
            <span class="error-msg"></span>
          </div>
        </div>

        <!-- Event Selection -->
        <div class="form-group">
          <label>Select Event <span class="required">*</span></label>
          <select name="event" class="form-control" required>
            <option value="">Choose an Event</option>
            <option value="TechFest 2026">TechFest 2026</option>
            <option value="Cultural Night">Cultural Night</option>
            <option value="Sports Meet">Sports Meet</option>
            <option value="Workshop Series">Workshop Series</option>
            <option value="Guest Lecture">Guest Lecture</option>
            <option value="Quiz Competition">Quiz Competition</option>
          </select>
          <span class="error-msg"></span>
        </div>

        <!-- File Upload -->
        <div class="form-group">
          <label>ID Proof (Optional)</label>
          <div class="file-upload">
            <input type="file" name="id_proof" id="id_proof" accept=".jpg,.jpeg,.png,.pdf">
            <div class="upload-icon">&#128206;</div>
            <p>Click to upload or drag and drop</p>
            <p style="font-size:0.75rem;margin-top:4px;">JPG, PNG, or PDF (Max 2MB)</p>
            <p class="file-name" style="display:none;"></p>
          </div>
          <span class="error-msg"></span>
        </div>

        <!-- Submit -->
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:8px;">
          Submit Registration &#10148;
        </button>

      </form>
    </div>

    <!-- Footer -->
    <footer class="footer">
      <p>&copy; 2026 EventHub | College Event Management System</p>
    </footer>

  </div>

  <script src="script.js"></script>
</body>
</html>
